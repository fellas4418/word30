<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - 영문법 단어장</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
</head>
<body>
    <div id="registrationModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 400px; text-align: center;">
            <h2 style="color: #1F3B34; margin-top: 0;">환영합니다!</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">결과 리포트에 표시될 이름을 적어주세요.</p>
            <input type="text" id="userName" placeholder="이름 (필수)" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <input type="text" id="userContact" placeholder="연락처 입력 시 VOD 할인 혜택!" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <label style="display: block; text-align: left; font-size: 12px; margin-bottom: 20px; color: #555;">
                <input type="checkbox" id="privacyConsent"> [필수] 개인정보 수집 및 이벤트 알림에 동의합니다.
            </label>
            <button id="saveUserBtn" class="doodle-btn" style="width: 100%; background-color: #FF6B3D; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">학습 시작하기</button>
        </div>
    </div>

    <div class="app" style="display: none;">
        <div class="progress" style="display: flex; justify-content: space-between; align-items: center;">
            <span class="doodle-badge">남은 문제: <span id="remaining">30</span> <span style="font-size: 11px; color: #e74c3c; margin-left: 5px; font-weight: bold;">🔊 폰 소리를 켜주세요!</span></span>
            <button id="quitBtn" style="background: none; border: 2px solid #2C3639; border-radius: 8px; padding: 4px 10px; font-weight: bold; cursor: pointer; color: #2C3639;">중단하기</button>
        </div>
    
        <div class="card doodle-box" id="wordCard">
            <div id="word" class="word">준비 중...</div>
            <div id="timer" class="timer">10</div>
        </div>
    
        <div class="pos-buttons">
            <button data-pos="noun" class="doodle-btn" disabled>명사</button>
            <button data-pos="verb" class="doodle-btn" disabled>동사</button>
            <button data-pos="adj" class="doodle-btn" disabled>형용사</button>
        </div>
    </div>
    
    <div id="startOverlay" class="lobby-overlay">
        <div class="lobby-container">
            <div class="header-section text-center">
                <h1 class="brand-title">Trigger<br>Voca</h1>
            </div>

            <div class="doodle-box main-action-card text-center">
                <img src="https://cdn-icons-png.flaticon.com/512/2941/2941566.png" alt="book" class="deco-icon">
                <h2>오늘의 학습</h2>
                <p>목표 단어: <strong>30개</strong></p>
                <button id="startBtn" class="doodle-btn primary-btn">학습 시작하기</button>
            </div>

            <div class="grid-2col">
                <div class="doodle-box mini-card text-center">
                    <h3>내 단어장</h3>
                    <p>120 단어</p>
                </div>
                <div class="doodle-box mini-card text-center" onclick="startReview()" style="cursor: pointer;">
                    <h3>오답 노트</h3>
                    <p id="weakListCount">0 단어</p>
                </div>
            </div>

            <div id="curriculumSection" class="doodle-box list-card" style="margin-top: 20px;">
                <h3>📅 트리거 보카 매일 학습</h3>
                <ul class="curriculum-list">
                    <li>
                        <span>Day 1. 문장의 뼈대 동사</span>
                        <button class="status-badge start-day-btn" data-day="day1">시작</button>
                    </li>
                    <li>
                        <span>Day 2. 살을 붙이는 수식어</span>
                        <button id="btn-day2" class="status-badge start-day-btn" data-day="day2" style="background-color: #95a5a6;" disabled>🔒 잠김</button>
                    </li>
                    <li>
                        <span>Day 3. 시제와 조동사</span>
                        <button class="status-badge waiting" disabled>대기</button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    
    <script src="js/app.js?v=9"></script>
</body>
</html>
