<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Voca - 영문법 단어장</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
</head>
<body>
    <div id="registrationModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:16px; padding:32px 24px; width:90%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,0.2); font-family:inherit;">
            <h2 style="margin:0 0 6px 0; font-size:20px; font-weight:bold;">📝 학습 시작 전 등록</h2>
            <p style="margin:0 0 20px 0; font-size:13px; color:#888;">이름을 입력하면 나만의 학습 리포트를 받을 수 있어요!</p>
    
            <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:6px;">이름 <span style="color:red;">*</span></label>
            <input id="userName" type="text" placeholder="이름을 입력하세요" required
                style="width:100%; padding:10px 12px; border:2px solid #2C3639; border-radius:10px; font-size:15px; box-sizing:border-box; margin-bottom:14px;" />
    
            <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:6px;">연락처 (선택)</label>
            <input id="userContact" type="text" placeholder="연락처 입력 시 3시간 영문법 VOD 할인 혜택!"
                style="width:100%; padding:10px 12px; border:2px solid #ccc; border-radius:10px; font-size:14px; box-sizing:border-box; margin-bottom:14px;" />
    
            <label style="display:flex; align-items:flex-start; gap:8px; font-size:12px; color:#444; margin-bottom:20px; cursor:pointer;">
                <input id="privacyConsent" type="checkbox" style="margin-top:2px; width:16px; height:16px; flex-shrink:0;" />
                <span>[필수] 개인정보 수집 및 이벤트 알림에 동의합니다.</span>
            </label>
    
            <button id="saveUserBtn"
                style="width:100%; padding:13px; background:#2C3639; color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer;">
                학습 시작하기 🚀
            </button>
        </div>
    </div>
    <div class="app" style="display: none;">
        <div class="progress" style="display: flex; justify-content: space-between; align-items: center;">
            <span class="doodle-badge">남은 문제: <span id="remaining">30</span> <span style="font-size: 11px; color: #e74c3c; margin-left: 5px; font-weight: bold;">🔊 폰 소리를 켜주세요!</span></span>
            <button id="quitBtn" style="background: none; border: 2px solid #2C3639; border-radius: 8px; padding: 4px 10px; font-weight: bold; cursor: pointer; color: #2C3639;">중단하기</button>
        </div>
    
        <div class="card doodle-box" id="wordCard">
            <div id="word" class="word">준비 중...</div>
            <div id="timer" class="timer">10</div>
        </div>
    
        <div class="pos-buttons">
            <button data-pos="noun" class="doodle-btn" disabled>명사</button>
            <button data-pos="verb" class="doodle-btn" disabled>동사</button>
            <button data-pos="adj" class="doodle-btn" disabled>형용사</button>
        </div>
    </div>
    
    <div class="lobby-overlay">
        <div class="card doodle-box">
            <h1 class="title">Trigger Voca</h1>
            <p style="text-align: center; color: #1F3B34; margin-bottom: 20px;">단어를 보면 반사적으로 뜻이 튀어나온다!</p>
    
            <button onclick="startReview()" class="doodle-btn" style="width: 100%; margin-bottom: 20px; background-color: #2C3639; color: white;">
                🔥 나의 오답 노트 <span id="weakListCount" style="color: #FF6B3D;">0 단어</span>
            </button>
    
            <div id="curriculumSection" style="display: block;">
                <h3 style="color: #1F3B34; margin-bottom: 15px; text-align: left;">📅 트리거 보카 매일 학습</h3>
                <ul class="curriculum-list">
                    <li>
                        <span>Day 1. 문장의 뼈대 동사</span>
                        <button id="btn-day1" class="status-badge start-day-btn" data-day="day1">시작</button>
                    </li>
                    <li>
                        <span>Day 2. 살을 붙이는 수식어</span>
                        <button id="btn-day2" class="status-badge start-day-btn" data-day="day2" style="background-color: #95a5a6;" disabled>🔒 잠김</button>
                    </li>
                    <li>
                        <span>Day 3. 시제와 조동사</span>
                        <button class="status-badge waiting" disabled>대기</button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    
    <script src="js/app.js?v=4"></script>
</body>
</html>
